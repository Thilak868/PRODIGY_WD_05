<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App - Task 05</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="weather-card">
        <h1>Weather App</h1>
        <p id="locationStatus">Detecting your location...</p>
        <div class="search">
            <input type="text" id="cityInput" placeholder="Enter city name...">
            <button id="searchBtn">Search</button>
        </div>

        <div id="weatherDisplay" class="display-hidden">
            <div class="main-info">
                <img id="weatherIcon" src="" alt="Weather Icon">
                <h2 id="cityName">---</h2>
                <p id="description" style="text-transform: capitalize; opacity: 0.8;">---</p>
            </div>
            
            <div class="temp-container">
                <span id="temp">0</span>°C
            </div>

           <div class="details">
                <p>Humidity: <span id="humidity">0</span>%</p>
                <p>Wind: <span id="wind">0</span> km/h</p>
            </div>
        </div>
        <div id="forecastContainer" class="forecast-grid display-hidden"></div>
    </div> <script src="script.js"></script>
</body>
</html>
